<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Node.js Site</title>
  <style>
    body {font-family: Arial, sans-serif; padding: 2rem; background: #f0f0f0;}
    h1 {color: #333;}
  </style>
</head>
<body>
  <h1>Welcome to the Test Node.js Site</h1>
  <p>This is a simple static page served by Express.</p>
  <script>
    // Example API call
    fetch('/api/hello')
      .then(r => r.json())
      .then(data => {
        const p = document.createElement('p');
        p.textContent = `API says: ${data.message}`;
        document.body.appendChild(p);
      })
      .catch(console.error);
  </script>
</body>
</html>
